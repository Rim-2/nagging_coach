name: Build Android Satellite APK

on:
  push:
    paths:
      - 'android-satellite/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:  # 수동 실행 가능 (GitHub Actions 탭에서 'Run workflow')

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        working-directory: ./android-satellite
        run: gradle assembleDebug --stacktrace --info --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nagging-coach-satellite-debug
          path: android-satellite/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
