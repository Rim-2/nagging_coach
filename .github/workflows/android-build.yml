name: Build Android Satellite APK

on:
  push:
    paths:
      - 'android-satellite/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:  # 수동 실행 가능 (GitHub Actions 탭에서 'Run workflow')

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        id: build
        working-directory: ./android-satellite
        continue-on-error: true
        run: |
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build-output.log

      - name: Show compiler errors only (if build failed)
        if: steps.build.outcome == 'failure'
        working-directory: ./android-satellite
        run: |
          echo "=========== ERROR LINES ============"
          grep -nE "error:" build-output.log || echo "(no 'error:' lines)"
          echo ""
          echo "=========== FAILED TASKS ============"
          grep -nE "FAILED|What went wrong" build-output.log || true
          echo ""
          echo "=========== LAST 120 LINES ============"
          tail -120 build-output.log
          echo "=========== END ============"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android-satellite/build-output.log
          if-no-files-found: warn

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nagging-coach-satellite-debug
          path: android-satellite/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
