name: Build Android Satellite APK

on:
  push:
    paths:
      - 'android-satellite/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:  # 수동 실행 가능 (GitHub Actions 탭에서 'Run workflow')

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        id: build
        working-directory: ./android-satellite
        continue-on-error: true
        run: |
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build-output.log

      - name: Show compiler errors only (if build failed)
        if: steps.build.outcome == 'failure'
        working-directory: ./android-satellite
        run: |
          echo "=== Compiler errors ==="
          grep -E "error:|FAILED|Caused by|Exception in" build-output.log | head -80 || true
          echo "=== Last 80 lines of build output ==="
          tail -80 build-output.log
          echo "=== End ==="
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nagging-coach-satellite-debug
          path: android-satellite/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
